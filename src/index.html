<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OPEN CODE Mobile</title>
  <link rel="stylesheet" href="css/liquid-glass.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="glass-particles"></div>
    <div id="gradient-bg"></div>

    <header id="header">
      <div class="header-glass">
        <div class="header-left">
          <div class="app-icon">
            <svg width="28" height="28" viewBox="0 0 234 42" fill="none">
              <path d="M18 30H6V18H18V30Z" fill="#CFCECD"/>
              <path d="M18 12H6V30H18V12ZM24 36H0V6H24V36Z" fill="#656363"/>
              <path d="M48 30H36V18H48V30Z" fill="#CFCECD"/>
              <path d="M36 30H48V12H36V30ZM54 36H36V42H30V6H54V36Z" fill="#656363"/>
              <path d="M84 24V30H66V24H84Z" fill="#CFCECD"/>
              <path d="M84 24H66V30H84V36H60V6H84V24ZM66 18H78V12H66V18Z" fill="#656363"/>
              <path d="M108 36H96V18H108V36Z" fill="#CFCECD"/>
              <path d="M108 12H96V36H90V6H108V12ZM114 36H108V12H114V36Z" fill="#656363"/>
              <path d="M144 30H126V18H144V30Z" fill="#CFCECD"/>
              <path d="M144 12H126V30H144V36H120V6H144V12Z" fill="#211E1E"/>
              <path d="M168 30H156V18H168V30Z" fill="#CFCECD"/>
              <path d="M168 12H156V30H168V12ZM174 36H150V6H174V36Z" fill="#211E1E"/>
              <path d="M198 30H186V18H198V30Z" fill="#CFCECD"/>
              <path d="M198 12H186V30H198V12ZM204 36H180V6H198V0H204V36Z" fill="#211E1E"/>
              <path d="M234 24V30H216V24H234Z" fill="#CFCECD"/>
              <path d="M216 12V18H228V12H216ZM234 24H216V30H234V36H210V6H234V24Z" fill="#211E1E"/>
            </svg>
          </div>
          <div class="header-info">
            <h1 class="app-title">OPEN CODE</h1>
            <span class="app-subtitle">Mobile</span>
          </div>
        </div>
        <div class="header-right">
          <div class="status-dot online"></div>
          <button id="menuBtn" class="glass-btn" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </header>

    <main id="chat-container">
      <div id="welcome-screen">
        <div class="welcome-glass">
          <div class="welcome-icon">
            <svg width="64" height="64" viewBox="0 0 234 42" fill="none">
              <path d="M18 30H6V18H18V30Z" fill="#CFCECD"/>
              <path d="M18 12H6V30H18V12ZM24 36H0V6H24V36Z" fill="#656363"/>
              <path d="M48 30H36V18H48V30Z" fill="#CFCECD"/>
              <path d="M36 30H48V12H36V30ZM54 36H36V42H30V6H54V36Z" fill="#656363"/>
              <path d="M84 24V30H66V24H84Z" fill="#CFCECD"/>
              <path d="M84 24H66V30H84V36H60V6H84V24ZM66 18H78V12H66V18Z" fill="#656363"/>
              <path d="M108 36H96V18H108V36Z" fill="#CFCECD"/>
              <path d="M108 12H96V36H90V6H108V12ZM114 36H108V12H114V36Z" fill="#656363"/>
              <path d="M144 30H126V18H144V30Z" fill="#CFCECD"/>
              <path d="M144 12H126V30H144V36H120V6H144V12Z" fill="#CFCECD"/>
              <path d="M168 30H156V18H168V30Z" fill="#CFCECD"/>
              <path d="M168 12H156V30H168V12ZM174 36H150V6H174V36Z" fill="#CFCECD"/>
              <path d="M198 30H186V18H198V30Z" fill="#CFCECD"/>
              <path d="M198 12H186V30H198V12ZM204 36H180V6H198V0H204V36Z" fill="#CFCECD"/>
              <path d="M234 24V30H216V24H234Z" fill="#CFCECD"/>
              <path d="M216 12V18H228V12H216ZM234 24H216V30H234V36H210V6H234V24Z" fill="#CFCECD"/>
            </svg>
          </div>
          <h2 class="welcome-title">Welcome to OPEN CODE Mobile</h2>
          <p class="welcome-text">Your AI coding agent, now on mobile.<br>Powered by Liquid Glass.</p>
          <div class="welcome-features">
            <div class="feature-item"><span class="feature-icon">&#9889;</span> Multi-Model AI</div>
            <div class="feature-item"><span class="feature-icon">&#128187;</span> Code Assistant</div>
            <div class="feature-item"><span class="feature-icon">&#128274;</span> Privacy First</div>
          </div>
        </div>
      </div>
      <div id="messages"></div>
    </main>

    <div id="typing-indicator" class="typing-hidden">
      <div class="typing-glass">
        <div class="typing-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <span class="typing-text">AI is thinking...</span>
      </div>
    </div>

    <footer id="input-bar">
      <div class="input-glass">
        <button id="attachBtn" class="glass-icon-btn" aria-label="Attach">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <div class="input-wrapper">
          <textarea id="messageInput" rows="1" placeholder="Message OPEN CODE..." autocomplete="off"></textarea>
        </div>
        <button id="sendBtn" class="glass-send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </footer>

    <div id="settings-panel" class="panel-hidden">
      <div class="panel-backdrop" id="panelBackdrop"></div>
      <div class="panel-glass">
        <div class="panel-header">
          <h2>Settings</h2>
          <button id="closePanel" class="glass-icon-btn">&times;</button>
        </div>
        <div class="panel-body">
          <div class="setting-group">
            <label>AI Model</label>
            <select id="modelSelect" class="glass-input">
              <option value="gpt-4">GPT-4</option>
              <option value="gpt-3.5">GPT-3.5</option>
              <option value="claude-3">Claude 3</option>
              <option value="gemini">Gemini</option>
            </select>
          </div>
          <div class="setting-group">
            <label>API Key</label>
            <input type="password" id="apiKeyInput" class="glass-input" placeholder="Enter your API key">
          </div>
          <div class="setting-group">
            <label>Theme</label>
            <div class="theme-options">
              <button class="theme-btn active" data-theme="dark">Dark</button>
              <button class="theme-btn" data-theme="light">Light</button>
              <button class="theme-btn" data-theme="ocean">Ocean</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/animations.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
