name: Build OPEN CODE Mobile APK

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release'
        required: true
        default: 'false'
        type: boolean
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Init & Add Android
        run: |
          npx cap init "OPEN CODE Mobile" "com.opencode.mobile" --web-dir src
          npx cap add android

      - name: Copy web assets
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Release APK
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Release APK
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || 'v1.0.0' }}
          name: "OPEN CODE Mobile ${{ github.event.inputs.version || 'v1.0.0' }}"
          body: |
            # OPEN CODE Mobile
            
            AI Coding Agent for Android with Liquid Glass UI ✨
            
            ## Features
            - 🌊 **Liquid Glass UI** - Stunning glass morphism interface
            - 🤖 **Multi-Model AI** - GPT-4, Claude 3.5, Gemini 2.0 support
            - 🔐 **Sign in with Google** - Like ChatGPT
            - 📱 **Mobile Native** - Built for Android
            - 🔒 **Privacy First** - Your API keys stay on device
            
            ## Installation
            Download the APK and install it on your Android device.
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
